<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashcat Cracker - تكسير الهاشات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="file"],
        select,
        button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .result pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .hash-stats {
            display: inline-block;
            padding: 5px 10px;
            background: #e0e0e0;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔐 Hashcat Cracker</h1>
        <p>تكسير الهاشات باستخدام قوة الخادم</p>
    </div>
    
    <div class="content">
        <div class="alert alert-info">
            ⚡ ملاحظة: هذه الخدمة للأغراض التعليمية فقط. قد يستغرق التكسير وقتاً حسب قوة الخادم وحجم ملف الكلمات.
        </div>
        
        <form id="crackForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>📁 ملف CAP أو ملف الهاش:</label>
                <input type="file" name="hashfile" id="hashfile" accept=".cap,.pcap,.txt,.hc22000" required>
                <small style="color: #666; display: block; margin-top: 5px;">يدعم: .cap (WPA/WPA2), .hc22000, .txt</small>
            </div>
            
            <div class="form-group">
                <label>🔐 نوع الهاش (Hash Type):</label>
                <select name="hash_type" id="hash_type">
                    <option value="2500">WPA/WPA2 (2500)</option>
                    <option value="22000">WPA/WPA2 PMKID (22000)</option>
                    <option value="0">MD5 (0)</option>
                    <option value="1000">NTLM (1000)</option>
                    <option value="100">SHA1 (100)</option>
                    <option value="1400">SHA256 (1400)</option>
                    <option value="1800">SHA512 (1800)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📖 ملف كلمات المرور:</label>
                <select name="wordlist" id="wordlist">
                    <option value="wordlists/small.txt">small.txt (صغير - للاختبار)</option>
                    <option value="wordlists/rockyou-10.txt">rockyou-10.txt (10,000 كلمة)</option>
                    <option value="wordlists/common.txt">common.txt (قائمة شائعة)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>⚙️ إعدادات إضافية:</label>
                <select name="attack_mode" id="attack_mode">
                    <option value="0">هجوم القاموس (Dictionary Attack)</option>
                    <option value="3">هجوم القناع (Mask Attack - تجريبي)</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtn">🚀 ابدأ التكسير</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري التكسير... قد يستغرق هذا بضع دقائق</p>
        </div>
        
        <div class="result" id="result" style="display: none;">
            <h3>📊 النتائج</h3>
            <div id="resultContent"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('crackForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        
        submitBtn.disabled = true;
        loading.classList.add('active');
        resultDiv.style.display = 'none';
        
        try {
            const response = await fetch('upload.php', {
                method: 'POST',
                body: formData
            });
            
            const text = await response.text();
            document.getElementById('resultContent').innerHTML = text;
            resultDiv.style.display = 'block';
        } catch (error) {
            document.getElementById('resultContent').innerHTML = '<div class="alert" style="background: #f8d7da; color: #721c24;">❌ خطأ: ' + error.message + '</div>';
            resultDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            loading.classList.remove('active');
        }
    };
</script>
</body>
</html>
